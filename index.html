<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Kanban</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="padding: 20px;">
    <button onclick="openModal()" class="btn-new-task">+ Novo Card</button>
</div>

<div id="taskModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2>Cadastrar Nova Tarefa</h2>
        
        <label>Título</label>
        <input type="text" id="taskTitle" placeholder="Ex: Dano na Estrutura">

        <label>Descrição</label>
        <textarea id="taskDesc" rows="3" placeholder="Detalhes da manutenção..."></textarea>

        <label>Prioridade</label>
        <select id="taskPriority">
            <option value="Baixa">Baixa</option>
            <option value="Media">Média</option>
            <option value="Alta">Alta</option>
        </select>

        <label>Rótulo (Status)</label>
        <select id="taskLabel">
            <option value="Manutenção">Manutenção</option>
            <option value="Concluído">Concluído</option>
            <option value="Pendente">Pendente</option>
            <option value="Em Processo">Em processo</option>
            <option value="Sem recursos">Sem recursos</option>
        </select>

        <label>Imagem</label>
        <input type="file" id="taskImage" accept="image/*">

        <input type="hidden" id="editCardId"> 
        <button class="btn-save" id="btnMainAction" onclick="addTask()">Salvar Tarefa</button>
    </div>
</div>

    <div class="board">
        <div class="column" id="col-concluido" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h3>CONCLUIDO</h3>
            <div class="cards-container"></div>
        </div>

        <div class="column" id="col-pendente" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h3>PENDENTE</h3>
            <div class="cards-container"></div>
        </div>

        <div class="column" id="col-recursos" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h3>EM PROCESSO</h3>
            <div class="cards-container"></div>
        </div>

        <div class="column" id="col-material" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h3>AGUARDANDO CONFIRMAÇÃO DA TURMA</h3>
            <div class="cards-container"></div>
        </div>

        <div class="column" id="col-entrada" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h3>ENTRADA</h3>
            <div class="cards-container"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
